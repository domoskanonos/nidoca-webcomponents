<!DOCTYPE html>

<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta http-equiv="language" content="de" />
    <meta name="robots" content="index, follow" />
    <meta name="title" content="nidoca framework" />
    <meta name="description" content="nidoca framework" />
    <meta name="keywords" content="frontend, webcomponents" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />

    <title>nidoca framework</title>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@200;300;400;600;700;900&display=swap');
      @import url("https://fonts.googleapis.com/css?family=Material+Icons&display=block");

      :host,
      span,
      div {
        display: block;
      }

      :root {

        --space: 8px;
        --space-2: 16px;
        --space-3: 24px;
        --space-4: 32px;
        --space-6: 48px;
        --space-8: 64px;

        --border-width: 1px;

        --app-darken-1: 90%;
        --app-darken-2: 80%;
        --app-darken-3: 70%;
        --app-lighten-1: 110%;
        --app-lighten-2: 120%;
        --app-lighten-3: 130%;

        --app-color-background: #1e293b;
        --app-color-background-background: #ffffff;
        --app-color-background-background-optional: #f8fafc;
        --app-color-background-border: #9b9997;
        --app-color-background-selected: #ffe831;





        --app-color-surface: #000000;
        --app-color-surface-background: #eaeaea;
        --app-color-surface-background-optional: #f8fafc;
        --app-color-surface-border: #9b9997;
        --app-color-surface-selected: #ce9c30;
        --app-color-surface-hover: #e2e8f0;


        --app-color-primary: #e6e6e6;
        --app-color-primary-background: #0F172A;
        --app-color-primary-border: #a6a6a6;
        --app-color-primary-selected: #b2b2b2;

        --app-color-secondary: #ffffff;
        --app-color-secondary-background: #000000;
        --app-color-secondary-border: #808080;
        --app-color-secondary-selected: #808080;

        --line-height-input: 36px;
        --line-height-2: 48px;

        --font-size: 18px;
        --font-size-body-2: calc(var(--font-size) * 1);
        --font-size-subtitle-1: calc(var(--font-size) * 1);
        --font-size-subtitle-2: calc(var(--font-size) * 1);
        --font-size-button: calc(var(--font-size) * 1);
        --font-size-caption: calc(var(--font-size) * 1);

        --font-size-h6: calc(var(--font-size) * 1.2);
        --font-size-h5: calc(var(--font-size-h6) * 1.2);
        --font-size-h4: calc(var(--font-size-h5) * 1.2);
        --font-size-h3: calc(var(--font-size-h4) * 1.2);
        --font-size-h2: calc(var(--font-size-h3) * 1.2);
        --font-size-h1: calc(var(--font-size-h2) * 1.2);
        --font-size-overline: calc(var(--font-size-h4) * 1);

        --icon-size: 28px;
        --icon-size-big: 36px;
      }

      *,::slotted(*) {
        padding: 0;
        margin: 0;
        word-wrap: break-word;
        box-sizing: border-box;
        text-rendering: optimizelegibility;
        font-family: 'Source Sans Pro', sans-serif;
        font-size: var(--font-size);
        letter-spacing: normal;
        line-height:0;
        font-style: normal;
        text-decoration: none;
      }

      @media only screen and (max-width: 768px), only screen and (orientation: portrait) {
        :root {
          --font-size: calc(var(--font-size) * 0.8);
        }
      }

      @media only screen and (max-width: 1280px) {
        :root {
          --font-size: calc(var(--font-size) * 0.9);
        }
      }
    </style>
  </head>
  <body>
    <nidoca-app></nidoca-app>
  </body>
</html>
