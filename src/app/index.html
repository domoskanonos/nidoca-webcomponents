<!DOCTYPE html>

<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta http-equiv="language" content="de" />
    <meta name="robots" content="index, follow" />
    <meta name="title" content="nidoca framework" />
    <meta name="description" content="nidoca framework" />
    <meta name="keywords" content="frontend, webcomponents" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />

    <title>nidoca framework</title>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Asap+Condensed:wght@500&family=Oswald:wght@200;300;400;500;600;700&display=swap");
      @import url("https://fonts.googleapis.com/css?family=Material+Icons&display=block");

      :host, span, div {
        display: block;
      }

      :root {
        
        --app-color-background: #2c4776;
        --app-color-background-selected: #dd6f00;
        --app-color-background-background: #ffffff;
        --app-color-background-background-light: #f5f5f5;
        --app-color-background-background-dark: #e5f5f5;

        --app-color-primary: #ffffff;
        --app-color-primary-selected: #dd6f00;
        --app-color-primary-background: #2c4776;
        --app-color-primary-light: #4775a7;
        --app-color-primary-background-light: #3f6796;
        --app-color-primary-background-dark: #253d59;

        --app-color-secondary: #ffffff;
        --app-color-secondary-selected: #dd6f00;
        --app-color-secondary-background: #dd6f00;
        --app-color-secondary-light: #000000;
        --app-color-secondary-background-light: #ff972f;
        --app-color-secondary-background-dark: #c66300;

        --app-color-surface: #696868;
        --app-color-surface-selected: #dd6f00;
        --app-color-surface-background: #e3e3e3;
        --app-color-surface-background-light: #f5f5f5;
        --app-color-surface-background-dark: #d6d4d4;

        --app-color-success-background: #22bb33;
        --app-color-error-background: #b00020;
        --app-color-warning-background: #ffcc00;
        --app-color-info-background: #40a6ce;

        --app-color-success: #ffffff;
        --app-color-error: #ffffff;
        --color-warning: #ffffff;
        --app-color-info: #ffffff;

        --space-little: 0.5vmin;
        --space-small: 1vmin;
        --space-medium: 1.5vmin;
        --space-normal: 1.75vmin;
        --space-big: 2vmin;
        --space-max: 3vmin;

        --font-family: "Oswald", sans-serif;
        --letter-spacing: 2pt;
        --font-size: 16px;

        --menu-size: 275px;

        --icon-size: 24px;
        --icon-size-space: 48px;
        --icon-size-big:36px;

        --line-height-small: 24px;
        --line-height: 24px;
        --line-height-large: 48px;
        --line-height-big: 60px;
        --line-height-massiv: 72px;

      }

      * {
        background-color: var(--app-color-background-background);
        padding: 0;
        margin: 0;
        word-wrap: break-word;
        box-sizing: border-box;
        text-rendering: optimizelegibility;
        font-family: var(--font-family);
        font-size: var(--font-size);
        letter-spacing: var(--letter-spacing);
        font-style: normal;
        font-weight: 400;
        text-decoration: none;
        line-height: normal;
      }
    </style>
  </head>
  <body>
    <nidoca-app></nidoca-app>
  </body>
</html>
